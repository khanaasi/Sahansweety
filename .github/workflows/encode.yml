name: Video Encoder Workflow

on:
  workflow_dispatch:
    inputs:
      task_type:
        required: true
      video_id:
        required: true
      sub_id:
        required: true
      chat_id:
        required: true
      resolution:
        required: true
      wm_id:
        required: true
      wm_pos:
        required: true
      rename:
        required: true

jobs:
  encode_job:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Sys Deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Py Deps
        run: pip install pyrogram tgcrypto
      - name: Run Encoder
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          SUB_ID: ${{ github.event.inputs.sub_id }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
          WM_ID: ${{ github.event.inputs.wm_id }}
          WM_POS: ${{ github.event.inputs.wm_pos }}
          RENAME: ${{ github.event.inputs.rename }}
        run: python encoder.py
      - name: Cleanup
        if: always()
        run: rm -rf *
